services:
  # One-shot service that hydrates /data and /app/features_vlm from S3 before
  # the app starts. Skips files that already exist unless BOOTSTRAP_FORCE=1.
  # Teammates just do `docker compose up`; no manual artifact download needed.
  #
  # What gets synced by default:
  #   listings.db, bm25.pkl, geo/overpass_*.json, features_vlm/siglip2/*.npz
  #
  # Raw images (~30k files, ~4 GB) are OPT-IN via BOOTSTRAP_INCLUDE_IMAGES=1,
  # because the ranking pipeline doesn't need them at inference — the
  # pre-computed SigLIP2 shards already encode their visual content. Enable
  # only if you want to re-embed images or inspect them locally.
  bootstrap:
    image: amazon/aws-cli:2.15.0
    entrypoint: ["/bin/bash", "/app/scripts/bootstrap_from_s3.sh"]
    environment:
      ARTIFACTS_S3_BUCKET: ${ARTIFACTS_S3_BUCKET:-datathon-robinreal-085455950306-us-west-2}
      ARTIFACTS_S3_REGION: ${ARTIFACTS_S3_REGION:-us-west-2}
      BOOTSTRAP_INCLUDE_IMAGES: ${BOOTSTRAP_INCLUDE_IMAGES:-0}
      BOOTSTRAP_FORCE: ${BOOTSTRAP_FORCE:-0}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
    volumes:
      - listings_data:/data
      - .:/app
    restart: "no"

  api:
    build:
      context: .
    ports:
      - "8000:8000"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      LISTINGS_RAW_DATA_DIR: /app/raw_data
      LISTINGS_DB_PATH: /data/listings.db
      LISTINGS_S3_BUCKET: ${LISTINGS_S3_BUCKET:-datathon-robinreal-085455950306-us-west-2}
      LISTINGS_S3_REGION: ${LISTINGS_S3_REGION:-us-west-2}
      LISTINGS_S3_PREFIX: ${LISTINGS_S3_PREFIX:-raw/downloads/prod}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
      # Bedrock (workshop account) — populated from .env; leave empty to use
      # heuristic fallback for query understanding.
      BEDROCK_AWS_ACCESS_KEY_ID: ${BEDROCK_AWS_ACCESS_KEY_ID:-}
      BEDROCK_AWS_SECRET_ACCESS_KEY: ${BEDROCK_AWS_SECRET_ACCESS_KEY:-}
      BEDROCK_AWS_SESSION_TOKEN: ${BEDROCK_AWS_SESSION_TOKEN:-}
      BEDROCK_AWS_REGION: ${BEDROCK_AWS_REGION:-us-east-1}
      BEDROCK_QUERY_UNDERSTANDING_MODEL_ID: ${BEDROCK_QUERY_UNDERSTANDING_MODEL_ID:-anthropic.claude-sonnet-4-20250514-v1:0}
      BEDROCK_EMBEDDING_MODEL_ID: ${BEDROCK_EMBEDDING_MODEL_ID:-cohere.embed-multilingual-v3}
      BEDROCK_EXPLANATION_MODEL_ID: ${BEDROCK_EXPLANATION_MODEL_ID:-us.anthropic.claude-3-5-haiku-20241022-v1:0}
      FORCE_BEDROCK_FALLBACK: ${FORCE_BEDROCK_FALLBACK:-0}
      # Anthropic direct (fallback if Bedrock is blocked).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL_ID: ${ANTHROPIC_MODEL_ID:-claude-sonnet-4-20250514}
      # Local embedding fallback.
      USE_LOCAL_EMBEDDINGS: ${USE_LOCAL_EMBEDDINGS:-0}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-BAAI/bge-m3}
      # Cache dir for fastembed model downloads (persisted in the volume).
      FASTEMBED_CACHE_PATH: /data/fastembed_cache
    volumes:
      - listings_data:/data
      - .:/app
      - ~/.cache/huggingface:/root/.cache/huggingface
    # GPU is opt-in via docker-compose.gpu.yml:
    #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
    # CPU-only teammates just run `docker compose up` as usual.
  mcp:
    build:
      context: .
    command: uvicorn apps_sdk.server.main:app --host 0.0.0.0 --port 8001
    environment:
      APPS_SDK_LISTINGS_API_BASE_URL: http://api:8000
      APPS_SDK_PUBLIC_BASE_URL: http://localhost:8001
      APPS_SDK_PORT: 8001
      RESULTS_DIR: /results
    ports:
      - "8001:8001"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      api:
        condition: service_started
    volumes:
      - .:/app
      - ./results:/results

volumes:
  listings_data:
